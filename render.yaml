services:
  - type: web
    name: gestaopro-backend
    runtime: node
    plan: free
    buildCommand: cd producao-app/backend && npm install && npm run build
    startCommand: cd producao-app/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
